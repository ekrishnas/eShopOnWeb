name: Claude Issue-to-PR Agent

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  implement:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && !github.event.issue.pull_request) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || github.event.label.name == 'ai-fix'))
    runs-on: ubuntu-latest
    steps:
    - name: Check Anthropic credentials configured
      id: keycheck
      env:
        API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      run: |
        if [ -z "$API_KEY" ] && [ -z "$OAUTH_TOKEN" ]; then
          echo "configured=false" >> "$GITHUB_OUTPUT"
          echo "::notice::No ANTHROPIC_API_KEY / CLAUDE_CODE_OAUTH_TOKEN secret configured; agentic run skipped."
        else
          echo "configured=true" >> "$GITHUB_OUTPUT"
        fi
    - uses: actions/checkout@v4
      if: steps.keycheck.outputs.configured == 'true'
      with:
        fetch-depth: 1
    - name: Setup .NET
      if: steps.keycheck.outputs.configured == 'true'
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json
    - name: Run Claude Code
      if: steps.keycheck.outputs.configured == 'true'
      uses: anthropics/claude-code-action@v1
      with:
        anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
        claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        allowed_tools: "Bash(dotnet restore:*),Bash(dotnet build:*),Bash(dotnet test:*),Bash(dotnet format:*),Bash(git:*),Bash(gh:*),Read,Write,Edit,Grep,Glob"
