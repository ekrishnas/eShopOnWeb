name: Dependency Review (SCA)

on:
  pull_request:
    branches: [ main ]

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Block PRs that introduce packages with known high/critical CVEs
          fail-on-severity: high
          # Surface vulnerability details as PR comments
          comment-summary-in-pr: always
          # Deny packages with GPL/AGPL licenses (incompatible with commercial use)
          deny-licenses: GPL-3.0, AGPL-3.0

  dotnet-outdated:
    name: Check for outdated packages
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Install dotnet-outdated tool
        run: dotnet tool install --global dotnet-outdated-tool

      - name: Check for outdated packages
        # Report only; do not fail the build — use as an informational signal
        run: dotnet outdated ./eShopOnWeb.sln --output outdated-packages.md --output-format markdown || true

      - name: Upload outdated packages report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: outdated-packages-report
          path: outdated-packages.md
          retention-days: 7
