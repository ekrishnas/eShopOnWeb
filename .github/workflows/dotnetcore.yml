name: eShopOnWeb Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: Build, Test & Coverage Gate
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props', '**/*.csproj') }}
        restore-keys: nuget-${{ runner.os }}-
    - name: Restore
      run: dotnet restore ./eShopOnWeb.sln -p:ContinuousIntegrationBuild=true
    - name: Build
      run: dotnet build ./eShopOnWeb.sln --configuration Release --no-restore -p:ContinuousIntegrationBuild=true
    - name: Test with coverage
      run: dotnet test ./eShopOnWeb.sln --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --logger trx --results-directory coverage
    - name: Code Coverage Summary + Threshold Gate
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: 'coverage/**/coverage.cobertura.xml'
        badge: true
        fail_below_min: true
        format: markdown
        output: both
        thresholds: '8 80'
    - name: Upload code coverage results artifact
      uses: actions/upload-artifact@v4
      if: success() || failure()
      with:
        name: code-coverage-results
        path: code-coverage-results.md
        retention-days: 1
    - name: Save the PR number in an artifact
      if: github.event_name == 'pull_request' && (success() || failure())
      shell: bash
      env:
        PR_NUMBER: ${{ github.event.number }}
      run: echo $PR_NUMBER > pr-number.txt
    - name: Upload the PR number
      uses: actions/upload-artifact@v4
      if: github.event_name == 'pull_request' && (success() || failure())
      with:
        name: pr-number
        path: ./pr-number.txt
        retention-days: 1
